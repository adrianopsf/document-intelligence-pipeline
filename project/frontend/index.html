<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Intelligence Pipeline</title>
    <meta name="description" content="AI-powered document processing with OCR, RAG, and structured extraction">
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
                <h1>DocAI Pipeline</h1>
            </div>
            <div class="header-actions">
                <span class="status-badge" id="apiStatus">● Connecting...</span>
            </div>
        </header>

        <nav class="tabs">
            <button class="tab active" data-tab="upload" id="tabUpload">Upload</button>
            <button class="tab" data-tab="documents" id="tabDocuments">Documents</button>
            <button class="tab" data-tab="qa" id="tabQA">Q&A</button>
        </nav>

        <main class="content">
            <!-- Upload Section -->
            <section class="panel active" id="panelUpload">
                <div class="upload-zone" id="dropZone">
                    <div class="upload-icon">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                    </div>
                    <p class="upload-text">Drop PDF or image files here</p>
                    <p class="upload-hint">or click to browse — PDF, PNG, JPG, TIFF, BMP up to 50MB</p>
                    <input type="file" id="fileInput" accept=".pdf,.png,.jpg,.jpeg,.tiff,.bmp" hidden>
                </div>

                <div class="jobs-list" id="jobsList"></div>
            </section>

            <!-- Documents Section -->
            <section class="panel" id="panelDocuments">
                <div class="doc-list" id="docList">
                    <p class="empty-state">No documents yet. Upload a file to get started.</p>
                </div>
                <div class="doc-detail hidden" id="docDetail">
                    <button class="back-btn" id="backToList">← Back to list</button>
                    <div id="docDetailContent"></div>
                </div>
            </section>

            <!-- Q&A Section -->
            <section class="panel" id="panelQA">
                <div class="qa-container">
                    <div class="qa-input-group">
                        <textarea id="qaInput" placeholder="Ask a question about your documents..." rows="3"></textarea>
                        <button class="btn-primary" id="qaSubmit">Ask</button>
                    </div>
                    <div class="qa-results" id="qaResults"></div>
                </div>
            </section>
        </main>
    </div>

    <script src="/app.js"></script>
</body>
</html>
